apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastmenu
  namespace: fastmenu
  labels:
    app: fastmenu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastmenu
  template:
    metadata:
      labels:
        app: fastmenu
    spec:
      containers:
        - name: fastmenu
          image: ghcr.io/pinoluen-netizen/fastmenu:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
